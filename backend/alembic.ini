[alembic]
script_location = migrations
prepend_sys_path = .

# This is overridden in migrations/env.py to use settings.database_url
sqlalchemy.url = postgresql+asyncpg://wealth_gainer:wealth_gainer@localhost:5432/wealth_gainer

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
